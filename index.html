<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d1022" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f4f5ff" media="(prefers-color-scheme: light)" />
    <script>
      // Resolve theme before first paint — no flash of the wrong mode.
      // Priority: explicit user override (localStorage) > OS preference > dark.
      // Mirrored in src/lib/theme.tsx (ThemeProvider) once React mounts.
      (function () {
        try {
          var stored = localStorage.getItem('smartpg-theme-mode')
          var mode = stored === 'light' || stored === 'dark' ? stored : 'system'
          var resolved =
            mode === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : mode
          document.documentElement.setAttribute('data-theme', resolved)
        } catch (e) {}
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Inter:wght@400..800&display=swap"
      rel="stylesheet"
    />
